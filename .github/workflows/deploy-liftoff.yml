name: Deploy Liftoff

on:
  push:
    branches:
      - main
    paths:
      - 'liftoff/**'
      - '.github/workflows/deploy-liftoff.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 19180fe37a59a7e263aeea5878df2518
          command: pages deploy liftoff --project-name=triglass-liftoff --branch=main
