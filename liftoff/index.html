<!DOCTYPE html>
<html lang="en" style="background-color: #000;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liftoff — Triglass Productions</title>
  <meta name="description" content="Liftoff — A journey beyond the stars. A Triglass Productions project.">

  <!-- Scroll restoration must happen before anything else -->
  <script>
    if ('scrollRestoration' in history) {
      history.scrollRestoration = 'manual';
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;600;700&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- ES Module Import Map -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "cannon-es": "https://esm.sh/cannon-es@0.20.0"
    }
  }
  </script>

  <style>
    /* Reset & Base */
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: 'Inter', -apple-system, sans-serif;
      overflow-x: hidden;
    }

    /* Three.js Canvas Container */
    #liftoff-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Content overlay for text sections */
    .liftoff-content {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
      pointer-events: none;
      transition: opacity 0.3s ease-out;
    }

    .liftoff-content h1 {
      font-size: clamp(32px, 8vw, 80px);
      font-weight: 700;
      margin: 0 0 20px 0;
      letter-spacing: -0.02em;
    }

    .liftoff-content p {
      font-size: clamp(16px, 2vw, 22px);
      line-height: 1.6;
      color: rgba(255,255,255,0.7);
      margin: 0;
    }

    /* Scroll spacer - creates scroll height */
    .liftoff-scroll-spacer {
      height: 500vh;
      pointer-events: none;
    }

    /* Debug info */
    .liftoff-debug {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.8);
      color: #0f0;
      font-family: monospace;
      font-size: 12px;
      padding: 10px 15px;
      border-radius: 4px;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <!-- Entry point — loads all modules -->
  <script type="module" src="/liftoff-threejs-body.js"></script>
</body>
</html>
